services:
  muse:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sh", "-c", "echo '=== RUNNING DB PUSH ===' && npx prisma db push --accept-data-loss && echo '=== DB PUSH DONE, STARTING BOT ===' && node --enable-source-maps dist/scripts/start.js"]
    restart: unless-stopped
    volumes:
      - ./muse:/data
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-muse}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-muse}
      - KOKORO_BASE_URL=http://kokoro:8880
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      kokoro:
        condition: service_healthy
      ollama:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - muse-network

  dj-worker:
    # Reuses the exact same image as `muse` -- no separate Dockerfile
    # needed, since refresh-dj-cooccurrence.js only needs @prisma/client
    # and DATABASE_URL, both already baked into / passed to this image.
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["sh", "-c", "sleep 60 && while true; do node dist/scripts/refresh-dj-cooccurrence.js; sleep 900; done"]
    # The initial `sleep 60` gives `muse` a head start to run its `db push`
    # and create the DJ tables before this service's first query -- belt
    # and suspenders alongside depends_on below, since service_started
    # only means the muse CONTAINER started, not that db push finished
    # inside it. Refresh runs every 15 minutes (900s) after that.
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-muse}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-muse}
    depends_on:
      muse:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - muse-network

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    restart: unless-stopped
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - muse-network

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    mem_limit: 4g
    environment:
      - OLLAMA_KEEP_ALIVE=60s
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - muse-network

  db:
    image: postgres:15-alpine
    container_name: muse-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-muse}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-muse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - muse-network

networks:
  muse-network:
    driver: bridge

volumes:
  postgres_data:
  ollama-models:
